<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="chart-title chart-desc" viewBox="0 0 960 560">
  <title id="chart-title">Official tau2 airline test Pass@1</title>
  <desc id="chart-desc">Grouped bar chart comparing two Pass@1 evaluation trials for E0, E1, E2, and E5.</desc>
  <style>
    text { font-family: Arial, sans-serif; fill: #172033; }
    .title { font-size: 25px; font-weight: 700; }
    .subtitle { font-size: 14px; fill: #586174; }
    .axis { font-size: 13px; fill: #586174; }
    .group { font-size: 15px; font-weight: 700; }
    .value { font-size: 12px; font-weight: 700; }
    .legend { font-size: 13px; }
    .note { font-size: 12px; fill: #697386; }
  </style>

  <rect width="960" height="560" fill="#ffffff" rx="8"/>
  <text class="title" x="480" y="35" text-anchor="middle">Official tau2 Airline Test Pass@1</text>
  <text class="subtitle" x="480" y="59" text-anchor="middle">Two stochastic evaluation trials per experiment (higher is better)</text>

  <rect x="286" y="82" width="18" height="18" rx="2" fill="#087e8b"/>
  <text class="legend" x="312" y="96">Trial 1</text>
  <rect x="405" y="82" width="18" height="18" rx="2" fill="#f45b69"/>
  <text class="legend" x="431" y="96">Trial 2</text>
  <path d="M 561 82 L 570 91 L 561 100 L 552 91 Z" fill="#202938"/>
  <text class="legend" x="580" y="96">Two-trial mean</text>

  <line x1="92" y1="130" x2="900" y2="130" stroke="#d9dee7" stroke-width="1"/>
  <line x1="92" y1="215" x2="900" y2="215" stroke="#d9dee7" stroke-width="1"/>
  <line x1="92" y1="300" x2="900" y2="300" stroke="#d9dee7" stroke-width="1"/>
  <line x1="92" y1="385" x2="900" y2="385" stroke="#d9dee7" stroke-width="1"/>
  <line x1="92" y1="470" x2="900" y2="470" stroke="#8b95a7" stroke-width="1.5"/>

  <text class="axis" x="78" y="135" text-anchor="end">20%</text>
  <text class="axis" x="78" y="220" text-anchor="end">15%</text>
  <text class="axis" x="78" y="305" text-anchor="end">10%</text>
  <text class="axis" x="78" y="390" text-anchor="end">5%</text>
  <text class="axis" x="78" y="475" text-anchor="end">0%</text>
  <text class="axis" x="25" y="300" text-anchor="middle" transform="rotate(-90 25 300)">Pass@1</text>

  <rect x="130" y="322.5" width="52" height="147.5" rx="3" fill="#087e8b"/>
  <rect x="190" y="331.9" width="52" height="138.1" rx="3" fill="#f45b69"/>
  <text class="value" x="156" y="314" text-anchor="middle">8.674%</text>
  <text class="value" x="216" y="323" text-anchor="middle">8.125%</text>
  <path d="M 186 320 L 193 327 L 186 334 L 179 327 Z" fill="#202938" stroke="#ffffff" stroke-width="1.5"/>
  <text class="group" x="186" y="501" text-anchor="middle">E0</text>

  <rect x="330" y="278.8" width="52" height="191.2" rx="3" fill="#087e8b"/>
  <rect x="390" y="257.7" width="52" height="212.3" rx="3" fill="#f45b69"/>
  <text class="value" x="356" y="270" text-anchor="middle">11.25%</text>
  <text class="value" x="416" y="249" text-anchor="middle">12.49%</text>
  <path d="M 386 261 L 393 268 L 386 275 L 379 268 Z" fill="#202938" stroke="#ffffff" stroke-width="1.5"/>
  <text class="group" x="386" y="501" text-anchor="middle">E1</text>

  <rect x="530" y="193.8" width="52" height="276.2" rx="3" fill="#087e8b"/>
  <rect x="590" y="215" width="52" height="255" rx="3" fill="#f45b69"/>
  <text class="value" x="556" y="185" text-anchor="middle">16.25%</text>
  <text class="value" x="616" y="206" text-anchor="middle">15.00%</text>
  <path d="M 586 197 L 593 204 L 586 211 L 579 204 Z" fill="#202938" stroke="#ffffff" stroke-width="1.5"/>
  <text class="group" x="586" y="501" text-anchor="middle">E2</text>

  <rect x="730" y="172.5" width="52" height="297.5" rx="3" fill="#087e8b"/>
  <rect x="790" y="189.7" width="52" height="280.3" rx="3" fill="#f45b69"/>
  <text class="value" x="756" y="164" text-anchor="middle">17.50%</text>
  <text class="value" x="816" y="181" text-anchor="middle">16.49%</text>
  <path d="M 786 174 L 793 181 L 786 188 L 779 181 Z" fill="#202938" stroke="#ffffff" stroke-width="1.5"/>
  <text class="group" x="786" y="501" text-anchor="middle">E5</text>

  <text class="note" x="480" y="538" text-anchor="middle">Two reported runs per experiment; values are descriptive and are not confidence intervals.</text>
</svg>
