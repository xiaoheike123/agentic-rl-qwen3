mode: sync
group_size: 8
temperature: 1.0
top_p: 0.95
max_concurrent_episodes: 8
max_episode_attempts: 3
retry_backoff_seconds: 1.0
freeze_policy_during_collection: true
batch_barrier: true
context_compression:
  max_chars: 24000
  recent_events: 12
  max_event_chars: 12000
  first_user_budget: 8000
  minimum_event_budget: 256
